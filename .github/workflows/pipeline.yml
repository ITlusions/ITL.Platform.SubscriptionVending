name: Pipeline

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Compute version: bump on main, prerelease on develop/feature/*, read-only on PR ──
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.compute.outputs.version }}

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: pip install hatch

      - name: Compute version
        id: compute
        run: |
          BRANCH="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          RUN_NUMBER="${{ github.run_number }}"

          if [ "$EVENT" = "pull_request" ]; then
            # PRs: just read current version, no modification
            VERSION=$(hatch version)

          elif [ "$BRANCH" = "main" ]; then
            # main: bump patch, commit pyproject.toml, create tag, push
            hatch version patch
            VERSION=$(hatch version)
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pyproject.toml
            git commit -m "chore: bump version to $VERSION [skip ci]"
            git tag "v$VERSION"
            git push origin main --follow-tags

          else
            # develop / feature/*: prerelease tag, no commit
            BASE=$(hatch version)
            SANITIZED=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9.-]/-/g' | tr '[:upper:]' '[:lower:]')
            VERSION="${BASE}-${SANITIZED}.${RUN_NUMBER}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ── Python tests ──────────────────────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short -v

  # ── Bicep lint & validate ─────────────────────────────────────────────────────
  bicep-lint:
    name: Bicep Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure CLI + Bicep
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install

      - name: Bicep lint
        run: az bicep lint --file infra/main.bicep

      - name: Bicep build (syntax check)
        run: az bicep build --file infra/main.bicep --outdir /tmp

  # ── Docker build & push ───────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [version, test, bicep-lint]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (post-bump)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ needs.version.outputs.version }}"
          BRANCH="${{ github.ref_name }}"

          if [ "$BRANCH" = "main" ]; then
            MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            printf '%s\n%s\n%s\n%s\n' \
              "${IMAGE}:${VERSION}" \
              "${IMAGE}:${MAJOR_MINOR}" \
              "${IMAGE}:${MAJOR}" \
              "${IMAGE}:latest" > /tmp/docker_tags
          else
            echo "${IMAGE}:${VERSION}" > /tmp/docker_tags
          fi

          {
            echo "tags<<EOF"
            cat /tmp/docker_tags
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release (main only) ────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, docker]
    if: github.ref_name == 'main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true