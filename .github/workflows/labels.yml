name: Sync Labels

on:
  push:
    branches: ["main"]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: Sync Labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync labels via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse .github/labels.yml and upsert every label using gh CLI.
          # Uses 'gh label create --force' so existing labels are updated in place
          # and missing ones are created — no third-party action required.
          python3 - <<'EOF'
          import subprocess, sys
          try:
              import yaml
          except ImportError:
              subprocess.check_call([sys.executable, "-m", "pip", "install", "--quiet", "pyyaml"])
              import yaml

          with open(".github/labels.yml") as f:
              data = yaml.safe_load(f)

          labels = data.get("labels", data) if isinstance(data, dict) else data
          for label in labels:
              name  = label["name"]
              color = label.get("color", "ededed").lstrip("#")
              desc  = label.get("description", "")
              result = subprocess.run(
                  ["gh", "label", "create", name,
                   "--color", color, "--description", desc, "--force"],
                  capture_output=True, text=True,
              )
              if result.returncode == 0:
                  print(f"  ✓ {name}")
              else:
                  print(f"  ✗ {name}: {result.stderr.strip()}", file=sys.stderr)
          EOF
