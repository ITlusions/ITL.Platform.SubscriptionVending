name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (ignored when 'version' is set)"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit version to release (e.g. 1.2.3 — overrides bump)"
        required: false
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version, Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: pip install hatch

      - name: Bump version
        id: bump
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            hatch version "${{ inputs.version }}"
          else
            hatch version "${{ inputs.bump }}"
          fi
          NEW_VERSION=$(hatch version)
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "::error::pyproject.toml was not modified — version may already be ${{ steps.bump.outputs.version }}"
            exit 1
          fi
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push origin HEAD:main

      - name: Create and push git tag
        run: |
          if git rev-parse "${{ steps.bump.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.bump.outputs.tag }} already exists"
            exit 1
          fi
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
